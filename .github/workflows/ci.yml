name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test / Vet / Race
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go Version
        run: go version

      - name: Download Dependencies
        run: go mod download

      - name: Go Vet
        run: go vet ./...

      - name: Unit Tests
        run: go test ./...

      - name: Race Tests
        run: go test -race ./...
