name: Security

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  vulncheck:
    name: Vulnerability Scan (govulncheck)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  sbom:
    name: SBOM Export
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate SBOM
        run: |
          chmod +x scripts/security/generate_sbom.sh
          scripts/security/generate_sbom.sh ./artifacts/sbom

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-modules-sbom
          path: artifacts/sbom/go-modules.sbom.json
