services:
  kuroshio:
    build:
      context: ../../..
      dockerfile: Dockerfile
    ports:
      - "2525:2525"
      - "9090:9090"
    volumes:
      - ./config.yaml:/etc/kuroshio/config.yaml:ro
      - ./var/queue:/var/lib/kuroshio/queue
      - ./var/spool:/var/lib/kuroshio/spool
    depends_on:
      - otel-collector

  smtp-client:
    image: busybox:1.37
    command: ["sh", "-c", "tail -f /dev/null"]

  otel-collector:
    image: otel/opentelemetry-collector:0.147.0
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4318:4318"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - jaeger

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.17.0
    ports:
      - "16686:16686"
