services:
  prepare-data:
    image: busybox:1.37
    command:
      - sh
      - -c
      - mkdir -p /work/queue /work/spool && chown -R 65532:65532 /work/queue /work/spool
    volumes:
      - ./var:/work

  kuroshio:
    build:
      context: ../../..
      dockerfile: Dockerfile
    ports:
      - "2525:2525"
      - "9090:9090"
    volumes:
      - ./config.yaml:/etc/kuroshio/config.yaml:ro
      - ./var/queue:/var/lib/kuroshio/queue
      - ./var/spool:/var/lib/kuroshio/spool
    depends_on:
      prepare-data:
        condition: service_completed_successfully
      alloy:
        condition: service_started

  smtp-client:
    image: busybox:1.37
    command: ["sh", "-c", "tail -f /dev/null"]

  alloy:
    image: grafana/alloy:latest
    command: ["run", "/etc/alloy/config.alloy", "--server.http.listen-addr=0.0.0.0:12345", "--storage.path=/var/lib/alloy/data"]
    ports:
      - "4318:4318"
      - "12345:12345"
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - tempo
      - loki
      - prometheus

  tempo:
    image: grafana/tempo:2.3.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"
      - "4319:4318"

  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./loki.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml:ro

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - tempo
      - loki
      - prometheus
